<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIO/DO Control</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
    main { max-width: 980px; margin: 20px auto; padding: 0 12px 20px; }
    h1 { margin-bottom: 10px; }
    h2 { margin: 16px 0 8px; font-size: 18px; }
    .line-list { display: flex; flex-direction: column; gap: 8px; }
    .port-line { display: flex; align-items: center; gap: 8px; border-radius: 10px; padding: 8px; border: 1px solid #334155; }
    .port-line.on { background: #14532d; border-color: #22c55e; }
    .port-line.off { background: #7f1d1d; border-color: #ef4444; }
    .port-meta { width: 88px; font-weight: 700; }
    .label-view { flex: 1; font-weight: 600; }
    .label-input { flex: 1; border: 1px solid #334155; border-radius: 8px; padding: 8px; background: #0f172a; color: #e2e8f0; }
    .compact-actions { display: flex; gap: 6px; }
    button { border: 0; border-radius: 8px; padding: 8px 10px; color: white; cursor: pointer; font-weight: 700; }
    .toggle-button.on { background: #22c55e; color: #052e16; }
    .toggle-button.off { background: #ef4444; }
    .edit-button { background: #2563eb; }
    #error-text { min-height: 20px; color: #fca5a5; }
  </style>
</head>
<body>
<main>
  <h1>DIO / DO Ports</h1>
  <p id="error-text"></p>
  <section>
    <h2>DI (input)</h2>
    <div id="di-ports" class="line-list"></div>
  </section>
  <section>
    <h2>DO (output)</h2>
    <div id="do-ports" class="line-list"></div>
  </section>
</main>

<script>
  const applicationModel = {
    portsByKey: {},
    editByKey: {},
    requestInFlight: false,
    errorText: ""
  };

  const diPortsElement = document.getElementById("di-ports");
  const doPortsElement = document.getElementById("do-ports");
  const errorTextElement = document.getElementById("error-text");

  function buildPortKey(directionName, portNumber) {
    return directionName + "-" + String(portNumber);
  }

  function renderFromModel() {
    errorTextElement.textContent = applicationModel.errorText;
    diPortsElement.innerHTML = "";
    doPortsElement.innerHTML = "";

    const sortedKeys = Object.keys(applicationModel.portsByKey).sort(function sortPortKeys(leftKey, rightKey) {
      const leftPort = applicationModel.portsByKey[leftKey];
      const rightPort = applicationModel.portsByKey[rightKey];
      if (leftPort.direction === rightPort.direction) {
        return leftPort.port - rightPort.port;
      }
      return leftPort.direction < rightPort.direction ? -1 : 1;
    });

    sortedKeys.forEach(function renderSinglePort(portKey) {
      const singlePortState = applicationModel.portsByKey[portKey];
      const isEditingLabel = Boolean(applicationModel.editByKey[portKey]);

      const lineElement = document.createElement("article");
      lineElement.className = "port-line " + singlePortState.power;

      const metaElement = document.createElement("div");
      metaElement.className = "port-meta";
      metaElement.textContent = singlePortState.direction + " " + singlePortState.port;

      let labelElement;
      if (isEditingLabel) {
        labelElement = document.createElement("input");
        labelElement.className = "label-input";
        labelElement.value = singlePortState.label;
        labelElement.id = "input-" + portKey;
        labelElement.disabled = applicationModel.requestInFlight;
      } else {
        labelElement = document.createElement("div");
        labelElement.className = "label-view";
        labelElement.textContent = singlePortState.label;
      }

      const actionsElement = document.createElement("div");
      actionsElement.className = "compact-actions";

      const toggleButtonElement = document.createElement("button");
      toggleButtonElement.className = "toggle-button " + singlePortState.power;
      toggleButtonElement.textContent = singlePortState.power === "on" ? "ON" : "OFF";
      toggleButtonElement.disabled = applicationModel.requestInFlight;
      toggleButtonElement.addEventListener("click", function onToggleClick() {
        const nextPower = singlePortState.power === "on" ? "off" : "on";
        void sendPowerToServer(singlePortState.direction, singlePortState.port, nextPower);
      });

      const editButtonElement = document.createElement("button");
      editButtonElement.className = "edit-button";
      editButtonElement.textContent = isEditingLabel ? "💾" : "✏️";
      editButtonElement.disabled = applicationModel.requestInFlight;
      editButtonElement.addEventListener("click", function onEditClick() {
        if (!applicationModel.editByKey[portKey]) {
          applicationModel.editByKey[portKey] = true;
          renderFromModel();
          return;
        }

        const inputElement = document.getElementById("input-" + portKey);
        if (!inputElement) {
          applicationModel.errorText = "Input not found for save";
          renderFromModel();
          return;
        }
        applicationModel.editByKey[portKey] = false;
        void sendLabelToServer(singlePortState.direction, singlePortState.port, inputElement.value);
      });

      actionsElement.appendChild(toggleButtonElement);
      actionsElement.appendChild(editButtonElement);

      lineElement.appendChild(metaElement);
      lineElement.appendChild(labelElement);
      lineElement.appendChild(actionsElement);

      if (singlePortState.direction === "DI") {
        diPortsElement.appendChild(lineElement);
      } else {
        doPortsElement.appendChild(lineElement);
      }
    });
  }

  function applyStateFromServer(serverState) {
    const nextPortsByKey = {};
    serverState.ports.forEach(function addPortToMap(singlePortState) {
      nextPortsByKey[buildPortKey(singlePortState.direction, singlePortState.port)] = singlePortState;
    });

    applicationModel.portsByKey = nextPortsByKey;
    applicationModel.errorText = "";
    renderFromModel();
  }

  async function requestStateFromServer() {
    const response = await fetch("/api/state");
    if (!response.ok) {
      throw new Error("state request failed");
    }
    return response.json();
  }

  async function sendPowerToServer(directionName, portNumber, nextPower) {
    applicationModel.requestInFlight = true;
    applicationModel.errorText = "";
    renderFromModel();

    try {
      const response = await fetch("/api/power", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ direction: directionName, port: portNumber, power: nextPower })
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      applyStateFromServer(await response.json());
    } catch (requestError) {
      applicationModel.errorText = String(requestError);
    } finally {
      applicationModel.requestInFlight = false;
      renderFromModel();
    }
  }

  async function sendLabelToServer(directionName, portNumber, nextLabel) {
    applicationModel.requestInFlight = true;
    applicationModel.errorText = "";
    renderFromModel();

    try {
      const response = await fetch("/api/label", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ direction: directionName, port: portNumber, label: nextLabel })
      });
      if (!response.ok) {
        throw new Error(await response.text());
      }
      applyStateFromServer(await response.json());
    } catch (requestError) {
      applicationModel.errorText = String(requestError);
    } finally {
      applicationModel.requestInFlight = false;
      renderFromModel();
    }
  }

  requestStateFromServer().then(applyStateFromServer).catch(function onInitialError(initialError) {
    applicationModel.errorText = String(initialError);
    renderFromModel();
  });

  renderFromModel();
</script>
</body>
</html>
