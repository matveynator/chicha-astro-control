<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Socket Control</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .panel {
      width: 360px;
      padding: 20px;
      border-radius: 12px;
      background: #1e293b;
    }
    .status {
      margin: 14px 0;
      font-size: 18px;
    }
    .button-row {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: 0;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    #turn-on-button { background: #16a34a; }
    #turn-off-button { background: #dc2626; }
    #error-text { min-height: 20px; color: #fca5a5; margin-top: 10px; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>WebView Socket</h1>
    <div class="status">Power: <strong id="power-text">unknown</strong></div>
    <div class="button-row">
      <button id="turn-on-button">ON</button>
      <button id="turn-off-button">OFF</button>
    </div>
    <p id="error-text"></p>
  </main>

  <script>
    const applicationModel = {
      socketPower: "unknown",
      requestInFlight: false,
      errorText: ""
    };

    const powerTextElement = document.getElementById("power-text");
    const turnOnButtonElement = document.getElementById("turn-on-button");
    const turnOffButtonElement = document.getElementById("turn-off-button");
    const errorTextElement = document.getElementById("error-text");

    function renderFromModel() {
      powerTextElement.textContent = applicationModel.socketPower;
      turnOnButtonElement.disabled = applicationModel.requestInFlight;
      turnOffButtonElement.disabled = applicationModel.requestInFlight;
      errorTextElement.textContent = applicationModel.errorText;
    }

    function applyStateFromServer(serverStateObject) {
      applicationModel.socketPower = serverStateObject.socket_power;
      applicationModel.errorText = "";
      renderFromModel();
    }

    async function loadStateFromServer() {
      const response = await fetch("/api/state");
      if (!response.ok) {
        throw new Error("state request failed");
      }
      return response.json();
    }

    async function sendPowerToServer(nextPowerState) {
      applicationModel.requestInFlight = true;
      applicationModel.errorText = "";
      renderFromModel();

      try {
        const response = await fetch("/api/power", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ power: nextPowerState })
        });

        if (!response.ok) {
          throw new Error("power request failed");
        }

        const serverStateObject = await response.json();
        applyStateFromServer(serverStateObject);
      } catch (requestError) {
        applicationModel.errorText = String(requestError);
      } finally {
        applicationModel.requestInFlight = false;
        renderFromModel();
      }
    }

    turnOnButtonElement.addEventListener("click", function onTurnOnClick() {
      void sendPowerToServer("on");
    });

    turnOffButtonElement.addEventListener("click", function onTurnOffClick() {
      void sendPowerToServer("off");
    });

    loadStateFromServer()
      .then(applyStateFromServer)
      .catch(function onInitialStateError(initialLoadError) {
        applicationModel.errorText = String(initialLoadError);
        renderFromModel();
      });

    renderFromModel();
  </script>
</body>
</html>
