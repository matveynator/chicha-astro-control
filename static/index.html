<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECX-1000-2G DIO Panel</title>
  <style>
    :root {
      --background: #0b1020;
      --card: #121a2f;
      --card-border: #1f2a44;
      --text: #e7edf8;
      --muted: #95a2bf;
      --green: #22c55e;
      --gray: #64748b;
      --blue: #3b82f6;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: var(--background); color: var(--text); }
    main { max-width: 1200px; margin: 0 auto; padding: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; gap: 10px; }
    h1 { font-size: 20px; margin: 0; }
    .subtitle { color: var(--muted); margin: 0; font-size: 12px; }
    #error-text { min-height: 18px; color: #fca5a5; font-size: 12px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; min-height: 0; flex: 1; }
    .panel { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; min-height: 0; }
    .panel h2 { margin: 0 0 8px; font-size: 14px; }
    .channels { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; overflow: hidden; }
    .channel-card { border: 1px solid var(--card-border); border-radius: 10px; padding: 8px; display: flex; flex-direction: column; gap: 6px; background: rgba(9, 14, 28, 0.5); }
    .channel-header { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .channel-name { font-size: 12px; color: var(--muted); }
    .lamp { width: 10px; height: 10px; border-radius: 999px; background: var(--gray); border: 1px solid rgba(255,255,255,0.1); }
    .lamp.on { background: var(--green); box-shadow: 0 0 8px rgba(34, 197, 94, 0.8); }
    .lamp.off { background: #94a3b8; }

    .io-buttons { display: flex; gap: 6px; }
    button { border: 1px solid transparent; border-radius: 8px; height: 28px; font-size: 12px; color: white; cursor: pointer; background: #334155; }
    .button-on, .button-off { flex: 1; }
    .button-on.active { background: var(--green); color: #06270f; font-weight: 700; }
    .button-off.active { background: #9ca3af; color: #0b1020; font-weight: 700; }

    .pwm-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 6px; }
    input[type="range"] { width: 100%; }
    .pwm-value { min-width: 38px; text-align: right; color: var(--muted); font-size: 12px; }

    .label-row { display: grid; grid-template-columns: 1fr auto auto; gap: 6px; }
    .label-row input { height: 28px; border-radius: 8px; border: 1px solid var(--card-border); background: #0f172a; color: var(--text); padding: 0 8px; font-size: 12px; }
    .button-edit { width: 32px; background: #334155; }
    .button-save { width: 74px; background: #475569; }
    .button-save.saved { background: var(--green); color: #06270f; }
    .button-save.unsaved { background: var(--blue); }

    .input-signal { height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #1e293b; color: var(--muted); }
    .input-signal.on { color: #052d12; background: rgba(34, 197, 94, 0.9); font-weight: 700; }
  </style>
</head>
<body>
<main>
  <h1>ECX-1000-2G DIO Control</h1>
  <p class="subtitle">DIO mode: 8 DI (read-only) + 8 DO (ON/OFF + PWM command)</p>
  <p id="error-text"></p>

  <section class="layout">
    <article class="panel">
      <h2>Входящие сигналы (DI0..DI7)</h2>
      <div id="input-grid" class="channels"></div>
    </article>

    <article class="panel">
      <h2>Исходящие сигналы (DO0..DO7)</h2>
      <div id="output-grid" class="channels"></div>
    </article>
  </section>
</main>

<script>
  const applicationModel = {
    inputsByChannel: {},
    outputsByChannel: {},
    pendingRequest: false,
    errorText: "",
    unsavedLabels: {},
    savedHighlightByLabelKey: {}
  };

  const inputGridElement = document.getElementById("input-grid");
  const outputGridElement = document.getElementById("output-grid");
  const errorTextElement = document.getElementById("error-text");

  function renderFromModel() {
    errorTextElement.textContent = applicationModel.errorText;
    renderInputs();
    renderOutputs();
  }

  function renderInputs() {
    inputGridElement.innerHTML = "";
    const sortedInputChannels = Object.keys(applicationModel.inputsByChannel).map(Number).sort(sortAscendingNumbers);

    sortedInputChannels.forEach(function renderSingleInput(inputChannel) {
      const inputState = applicationModel.inputsByChannel[inputChannel];
      const labelStateKey = "input-" + inputChannel;
      const currentLabel = applicationModel.unsavedLabels[labelStateKey] || inputState.label;

      const inputCardElement = document.createElement("article");
      inputCardElement.className = "channel-card";

      const channelHeaderElement = document.createElement("div");
      channelHeaderElement.className = "channel-header";

      const channelTitleElement = document.createElement("span");
      channelTitleElement.className = "channel-name";
      channelTitleElement.textContent = "DI" + (inputChannel - 1);

      const lampElement = document.createElement("span");
      lampElement.className = "lamp " + inputState.signal;

      channelHeaderElement.appendChild(channelTitleElement);
      channelHeaderElement.appendChild(lampElement);

      const signalElement = document.createElement("div");
      signalElement.className = inputState.signal === "on" ? "input-signal on" : "input-signal";
      signalElement.textContent = inputState.signal === "on" ? "SIGNAL ON" : "signal off";

      const labelRowElement = buildLabelControls("input", inputChannel, currentLabel, labelStateKey);

      inputCardElement.appendChild(channelHeaderElement);
      inputCardElement.appendChild(signalElement);
      inputCardElement.appendChild(labelRowElement);
      inputGridElement.appendChild(inputCardElement);
    });
  }

  function renderOutputs() {
    outputGridElement.innerHTML = "";
    const sortedOutputChannels = Object.keys(applicationModel.outputsByChannel).map(Number).sort(sortAscendingNumbers);

    sortedOutputChannels.forEach(function renderSingleOutput(outputChannel) {
      const outputState = applicationModel.outputsByChannel[outputChannel];
      const labelStateKey = "output-" + outputChannel;
      const currentLabel = applicationModel.unsavedLabels[labelStateKey] || outputState.label;

      const outputCardElement = document.createElement("article");
      outputCardElement.className = "channel-card";

      const channelHeaderElement = document.createElement("div");
      channelHeaderElement.className = "channel-header";

      const channelTitleElement = document.createElement("span");
      channelTitleElement.className = "channel-name";
      channelTitleElement.textContent = "DO" + (outputChannel - 1);

      const lampElement = document.createElement("span");
      lampElement.className = "lamp " + outputState.power;

      channelHeaderElement.appendChild(channelTitleElement);
      channelHeaderElement.appendChild(lampElement);

      const buttonsRowElement = document.createElement("div");
      buttonsRowElement.className = "io-buttons";

      const enableOutputButtonElement = document.createElement("button");
      enableOutputButtonElement.className = outputState.power === "on" ? "button-on active" : "button-on";
      enableOutputButtonElement.textContent = "ON";
      enableOutputButtonElement.disabled = applicationModel.pendingRequest;
      enableOutputButtonElement.addEventListener("click", function handleEnableOutput() {
        void sendOutputPowerToServer(outputChannel, "on");
      });

      const disableOutputButtonElement = document.createElement("button");
      disableOutputButtonElement.className = outputState.power === "off" ? "button-off active" : "button-off";
      disableOutputButtonElement.textContent = "OFF";
      disableOutputButtonElement.disabled = applicationModel.pendingRequest;
      disableOutputButtonElement.addEventListener("click", function handleDisableOutput() {
        void sendOutputPowerToServer(outputChannel, "off");
      });

      buttonsRowElement.appendChild(enableOutputButtonElement);
      buttonsRowElement.appendChild(disableOutputButtonElement);

      const pwmRowElement = document.createElement("div");
      pwmRowElement.className = "pwm-row";

      const pwmSliderElement = document.createElement("input");
      pwmSliderElement.type = "range";
      pwmSliderElement.min = "0";
      pwmSliderElement.max = "100";
      pwmSliderElement.step = "1";
      pwmSliderElement.value = String(outputState.pwm);
      pwmSliderElement.disabled = applicationModel.pendingRequest;
      pwmSliderElement.addEventListener("change", function handlePWMChange() {
        void sendOutputPWMToServer(outputChannel, Number(pwmSliderElement.value));
      });

      const pwmValueElement = document.createElement("span");
      pwmValueElement.className = "pwm-value";
      pwmValueElement.textContent = String(outputState.pwm) + "%";

      pwmRowElement.appendChild(pwmSliderElement);
      pwmRowElement.appendChild(pwmValueElement);

      const labelRowElement = buildLabelControls("output", outputChannel, currentLabel, labelStateKey);

      outputCardElement.appendChild(channelHeaderElement);
      outputCardElement.appendChild(buttonsRowElement);
      outputCardElement.appendChild(pwmRowElement);
      outputCardElement.appendChild(labelRowElement);
      outputGridElement.appendChild(outputCardElement);
    });
  }

  function buildLabelControls(kind, channel, labelText, labelStateKey) {
    const labelRowElement = document.createElement("div");
    labelRowElement.className = "label-row";

    const labelInputElement = document.createElement("input");
    labelInputElement.value = labelText;
    labelInputElement.disabled = !applicationModel.unsavedLabels.hasOwnProperty(labelStateKey);
    labelInputElement.addEventListener("input", function handleLabelInputChange() {
      applicationModel.unsavedLabels[labelStateKey] = labelInputElement.value;
      applicationModel.savedHighlightByLabelKey[labelStateKey] = false;
      renderFromModel();
    });

    const editButtonElement = document.createElement("button");
    editButtonElement.className = "button-edit";
    editButtonElement.textContent = "✎";
    editButtonElement.disabled = applicationModel.pendingRequest;
    editButtonElement.addEventListener("click", function handleEditStart() {
      applicationModel.unsavedLabels[labelStateKey] = labelText;
      renderFromModel();
    });

    const saveButtonElement = document.createElement("button");
    const hasUnsavedLabel = applicationModel.unsavedLabels.hasOwnProperty(labelStateKey);
    const isSavedLabel = applicationModel.savedHighlightByLabelKey[labelStateKey] === true;
    saveButtonElement.className = isSavedLabel ? "button-save saved" : (hasUnsavedLabel ? "button-save unsaved" : "button-save");
    saveButtonElement.textContent = "Сохранить";
    saveButtonElement.disabled = applicationModel.pendingRequest || !hasUnsavedLabel;
    saveButtonElement.addEventListener("click", function handleLabelSave() {
      const nextLabel = applicationModel.unsavedLabels[labelStateKey];
      void sendLabelToServer(kind, channel, nextLabel, labelStateKey);
    });

    labelRowElement.appendChild(labelInputElement);
    labelRowElement.appendChild(editButtonElement);
    labelRowElement.appendChild(saveButtonElement);

    return labelRowElement;
  }

  function applyStateFromServer(serverState) {
    const nextInputsByChannel = {};
    serverState.inputs.forEach(function registerInput(inputState) {
      nextInputsByChannel[inputState.channel] = inputState;
    });

    const nextOutputsByChannel = {};
    serverState.outputs.forEach(function registerOutput(outputState) {
      nextOutputsByChannel[outputState.channel] = outputState;
    });

    applicationModel.inputsByChannel = nextInputsByChannel;
    applicationModel.outputsByChannel = nextOutputsByChannel;
    applicationModel.errorText = "";
    renderFromModel();
  }

  async function requestStateFromServer() {
    const stateResponse = await fetch("/api/state");
    if (!stateResponse.ok) {
      throw new Error("state request failed");
    }

    return stateResponse.json();
  }

  async function sendOutputPowerToServer(outputChannel, nextPower) {
    await runServerCommand(async function sendPowerCommand() {
      const powerResponse = await fetch("/api/output/power", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ channel: outputChannel, power: nextPower })
      });
      if (!powerResponse.ok) {
        throw new Error(await powerResponse.text());
      }

      applyStateFromServer(await powerResponse.json());
    });
  }

  async function sendOutputPWMToServer(outputChannel, nextPWM) {
    await runServerCommand(async function sendPWMCommand() {
      const pwmResponse = await fetch("/api/output/pwm", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ channel: outputChannel, pwm: nextPWM })
      });
      if (!pwmResponse.ok) {
        throw new Error(await pwmResponse.text());
      }

      applyStateFromServer(await pwmResponse.json());
    });
  }

  async function sendLabelToServer(kind, channel, nextLabel, labelStateKey) {
    await runServerCommand(async function sendLabelCommand() {
      const labelResponse = await fetch("/api/label", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ kind: kind, channel: channel, label: nextLabel })
      });
      if (!labelResponse.ok) {
        throw new Error(await labelResponse.text());
      }

      delete applicationModel.unsavedLabels[labelStateKey];
      applicationModel.savedHighlightByLabelKey[labelStateKey] = true;
      applyStateFromServer(await labelResponse.json());
    });
  }

  async function runServerCommand(serverCommandCallback) {
    applicationModel.pendingRequest = true;
    applicationModel.errorText = "";
    renderFromModel();

    try {
      await serverCommandCallback();
    } catch (requestError) {
      applicationModel.errorText = String(requestError);
    } finally {
      applicationModel.pendingRequest = false;
      renderFromModel();
    }
  }

  function sortAscendingNumbers(leftNumber, rightNumber) {
    return leftNumber - rightNumber;
  }

  function startSignalRefreshLoop() {
    setInterval(function pollState() {
      requestStateFromServer().then(applyStateFromServer).catch(function handleRefreshError(refreshError) {
        applicationModel.errorText = String(refreshError);
        renderFromModel();
      });
    }, 600);
  }

  requestStateFromServer().then(applyStateFromServer).catch(function handleInitialError(initialError) {
    applicationModel.errorText = String(initialError);
    renderFromModel();
  });

  startSignalRefreshLoop();
  renderFromModel();
</script>
</body>
</html>
